<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="main-container">
      <div class="card">
        <form action="" class="form-card">
          <h1 class="h1-title">Member Login</h1>
          <input type="text" placeholder="Username" class="username-input" />
          <input type="text" placeholder="Password" class="password-input" />
          <button type="submit" class="buttton-log">Login</button>
          <a href="" class="span-forgotpw-link">Forgot password?</a>
        </form>
        <span class="log_in_width-span">...or log in width:</span>
        <div class="div-container">
          <div class="social-div facebook-div">
            <span class="facebook-span">Facebook</span>
          </div>
          <div class="social-div twitter-div">
            <span class="twitter-span">Twitter</span>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
