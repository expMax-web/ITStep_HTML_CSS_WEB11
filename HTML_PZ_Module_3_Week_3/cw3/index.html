<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="main-container">
      <div class="main-image">
        <h1>CATS GALLERY</h1>
        <iframe
          name="myframe"
          src="cat_tied_256.png"
          frameborder="0"
          class="iframe-css"
        >
        </iframe>
      </div>
      <div class="div-group">
        <a href="./cat_tied_256.png" id="div1" target="myframe">
          <div class="div-cat">
            <img src="./cat_tied_64.png" class="img-cat" alt="" />
          </div>
        </a>
        <a href="./cat_eyes_256.png" id="div2" target="myframe">
          <div class="div-cat">
            <img src="./cat_eyes_64.png" class="img-cat" alt="" />
          </div>
        </a>
        <a href="./cat_purr_256.png" id="div3" target="myframe">
          <div class="div-cat">
            <img src="./cat_purr_64.png" class="img-cat" alt="" />
          </div>
        </a>
        <a href="./cat_cage_256.png" id="div4" target="myframe">
          <div class="div-cat">
            <img src="./cat_cage_64.png" class="img-cat" alt="" />
          </div>
        </a>
        <a href="./cat_clean_256.png" id="div5" target="myframe">
          <div class="div-cat">
            <img src="./cat_clean_64.png" class="img-cat" alt="" />
          </div>
        </a>
        <a href="./cat_box_256.png" id="div6" target="myframe">
          <div class="div-cat">
            <img src="./cat_box_64.png" class="img-cat" alt="" />
          </div>
        </a>
      </div>
    </main>
  </body>
</html>
