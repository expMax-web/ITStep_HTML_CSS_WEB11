<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <form action="" class="loginForm" name="loginForm">
      <div class="input-container">
        <label for="email" class="label">Your email:</label
        ><span class="error hidden" id="emailError">Wrong email address</span>
        <input type="email" name="email" id="email" class="input" />
      </div>
      <div class="input-container">
        <label for="login" class="label">Your password:</label>
        <span class="error hidden" id="passwordError">Invalid password</span>
        <input
          type="text"
          name="password"
          id="password"
          class="input"
          required
        />
      </div>
      <div class="input-container">
        <label for="repeatPassword" class="label">Repeat password:</label
        ><span class="error hidden" id="repeatPasswordError"
          >Password must match</span
        >
        <input
          type="text"
          name="repeatPassword"
          id="repeatPassword"
          class="input"
          required
        />
      </div>
      <button type="submit" class="submitButton">Sign In</button><br />
    </form>
    <script src="task1.js"></script>
  </body>
</html>
