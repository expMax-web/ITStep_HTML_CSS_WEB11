<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="style2.css" />
  </head>
  <body>
    <main class="main-container">
      <form action="#" method="POST">
        <div class="input-div">
          <h2 class="label">Inputs</h2>
          <input
            id="input"
            type="text"
            class="input"
            placeholder="Enter some text"
          />
          <input
            id="input-valid"
            type="text"
            class="input"
            placeholder="valid text"
          />
          <input
            id="input-invalid"
            type="text"
            class="input"
            placeholder="invalid text"
          />
        </div>
        <div class="checkbox-div">
          <h2 class="label">Check boxes</h2>
          <label class="container-label"
            >Subscribe
            <input type="checkbox" checked="checked" />
            <span class="checkmark checkmark-on"
              ><span class="checkmark-inside checkmark-inside-on"></span
            ></span>
          </label>
          <label class="container-label"
            >Subscribe
            <input type="checkbox" checked="checked" />
            <span class="checkmark checkmark-off"
              ><span class="checkmark-inside checkmark-inside-off"></span
            ></span>
          </label>
        </div>
        <div class="radio-div">
          <h2 for="radio-button" class="label">Radio buttons</h2>
          <span class="span">Gender:</span>
          <label class="radio-container"
            >Male
            <input type="radio" checked />
            <span class="radio"></span>
          </label>
          <label class="radio-container"
            >Female
            <input type="radio" />
            <span class="radio"></span>
          </label>
        </div>
        <div class="button-div">
          <h2 class="label">Buttons</h2>
          <button id="button" class="button button-active">Active</button>
          <button id="button" class="button button-hover">Hover</button>
          <button class="button button-danger">Danger</button>
          <button class="button button-Hover-danger">Hover</button>
          <button class="button button-disabled">Disabled</button>
          <button class="button-circle button-plus">
            <img src="./plus.png" class="button-img" />
          </button>
          <button class="button-circle button-minus">
            <img src="./minus.png" class="button-img" />
          </button>
        </div>
        <div class="text-area-div">
          <h2 for="text-area" class="label">Text area</h2>
          <textarea
            name="text-area"
            id="text-area"
            cols="30"
            rows="10"
            placeholder="Enter some text..."
          ></textarea>
        </div>
      </form>
    </main>
  </body>
</html>
