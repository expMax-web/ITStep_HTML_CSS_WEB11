<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>

        <li class="product-li">

        </li>
        <li class="product-li">

          </div>
        </li>
        <li class="product-li">

            <img src="./Food_C245-128.png" class="product-image" alt="Corn" />

        <li class="product-li">
          <div class="product">
            <img
              src="./Food_C239-128.png"

            />

          </div>
        </li>
        <li class="product-li">

            <span class="product-name">Beef</span>
          </div>
        </li>
        <li class="product-li">
          <div class="product">
            <img src="./Food_C205-128.png" class="product-image" alt="Fish" />
            <br />
            <span class="product-name">Fish</span>
          </div>
        </li>
        <li class="product-li">
          <div class="product">
            <img src="./Food_C203-128.png" class="product-image" alt="Eggs" />

            <span class="product-name">Eggs</span>
          </div>

        <li class="product-li">
          <div class="product">
            <img
              src="./Food_C235-128.png"

            />

            <span class="product-name">Coriander</span>
