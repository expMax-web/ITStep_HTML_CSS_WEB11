<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
      crossorigin="anonymous"
    ></script>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <nav
      class="navbar navbar-expand-lg navbar-dark ps-4 pe-3"
      style="background-color: #1b5589"
    >
      <div class="container-fluid p-2">
        <a class="navbar-brand" href="#"
          ><img src="chalkboard-teacher-solid.svg" alt="" class="svg"
        /></a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarSupportedContent"
          aria-controls="navbarSupportedContent"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link" aria-current="page" href="home.html">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link link-light" href="homework.html">Homework</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="settings.html">Settings</a>
            </li>
          </ul>
          <a class="navbar-brand" href="settings.html">
            <img
              src="./av_64.png"
              alt=""
              width="50"
              height="50"
              class="d-inline-block align-text-top"
            />
          </a>
        </div>
      </div>
    </nav>
    <div class="container-fluid p-4 pt-0">
      <p class="h1 text-center m-4">Settings</p>
      <div class="container-fluid d-flex col-12">
        <ul class="list-group list-group-horizontal col-12">
          <li
            class="list-group-item col-2 border-0"
            style="background-color: #cce5ff; color: #1b5589"
          >
            <p class="h4 text-center m-4">AVATAR</p>
          </li>
          <li
            class="list-group-item col-5 border-0"
            style="background-color: #cce5ff; color: #1b5589"
          >
            <p class="h4 text-center m-4">STUDENT'S INFO</p>
          </li>
          <li
            class="list-group-item col-5 border-0"
            style="background-color: #cce5ff; color: #1b5589"
          >
            <p class="h4 text-center m-4">CHANGE PASSWORD</p>
          </li>
        </ul>
      </div>
      <div class="container-fluid d-flex col-12">
        <fieldset class="col-2 p-4">
          <form>
            <img
              src="av_256.png"
              style="width: 150px"
              alt=""
              class="rounded mx-auto d-block"
            />
            <button
              type="submit"
              class="btn btn-secondary btn-block col-12 mt-4"
            >
              Choose photo
            </button>
          </form>
        </fieldset>
        <fieldset class="col-5 p-4">
          <form>
            <div class="mb-3">
              <input
                type="text"
                class="form-control"
                placeholder="First name"
                aria-label="First name"
              />
            </div>
            <div class="mb-3">
              <input
                type="text"
                class="form-control"
                placeholder="Last name"
                aria-label="Last name"
              />
            </div>
            <div class="mb-3">
              <input type="email" class="form-control" placeholder="Email" />
            </div>
            <div class="mb-3">
              <input
                type="text"
                class="form-control"
                placeholder="Phone number"
              />
            </div>
            <div class="mb-3">
              <input type="text" class="form-control" placeholder="Addres" />
            </div>
            <div class="mb-3">
              <input type="text" class="form-control" placeholder="FB link" />
            </div>
            <button
              type="submit"
              class="btn btn-secondary btn-block col-12 mt-4"
            >
              Save shanges
            </button>
          </form>
        </fieldset>
        <fieldset class="col-5 p-4">
          <form>
            <div class="mb-3">
              <input
                type="password"
                class="form-control"
                id="exampleInputPassword1"
                placeholder="Old password"
              />
            </div>
            <div class="mb-3">
              <input
                type="password"
                class="form-control"
                id="exampleInputPassword1"
                placeholder="New password"
              />
            </div>
            <div class="mb-3">
              <input
                type="password"
                class="form-control"
                id="exampleInputPassword1"
                placeholder="Repeat password"
              />
            </div>
            <button
              type="submit"
              class="btn btn-secondary btn-block col-12 mt-4"
            >
              Change password
            </button>
          </form>
        </fieldset>
      </div>
    </div>
  </body>
</html>
